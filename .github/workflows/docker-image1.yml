name: Frontend CI/CD deployment

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Install Dependencies
        run: npm install

      - name: Build Frontend Project
        run: npm run build

      - name: Build Docker Image
        run: |
          docker build -t midhula17/frontend-deployment:${{ github.sha }} .
          docker tag midhula17/frontend-deployment:${{ github.sha }} midhula17/frontend-deployment:latest

      - name: Push Docker Images
        run: |
          docker push midhula17/frontend-deployment:${{ github.sha }}
          docker push midhula17/frontend-deployment:latest

  deploy:
    needs: build-and-push
    runs-on: self-hosted

    steps:
      - name: Pull Latest Docker Image
        run: |
          sudo docker pull midhula17/frontend-deployment:latest

      - name: Stop Existing Container
        run: |
          sudo docker stop frontend-container || true
          sudo docker rm frontend-container || true

      - name: Run New Container
        run: |
          sudo docker run -d \
            --name frontend-container \
            -p 80:80 \
            --restart always \
            midhula17/frontend-deployment:latest
